<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Hakyll Blog - $title$</title>
    <link rel="stylesheet" href="/css/index.css" />
    <!-- <link rel="stylesheet" href="/css/sidebar.css" /> -->
    <link rel="icon" href="/images/favicon.ico">
    <!-- MDUI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdui@1.0.1/dist/css/mdui.min.css"
        integrity="sha384-cLRrMq39HOZdvE0j6yBojO4+1PrHfB7a9l5qLcmRm/fiWXYY+CndJPmyu5FV/9Tw" crossorigin="anonymous" />


</head>

<body>
    <div class="root-container">
        $partial("templates/appbar.html")$
        <header class="header-container">
            <div class="header-content">
                $if(banner)$
                <div class="post-image" style="background-image:url(/images/$banner$);"></div>
                $else$
                <div class="post-image" style="background-image:url(/images/default-banner.png);"></div>
                $endif$
                <div class="post-text">
                    $if(title)$
                    <h1 class="title-wrap">$title$</h1>
                    $endif$
                    $if(subtitle)$
                    <h2 class="title-sub-wrap">$subtitle$</h2>
                    $endif$
                </div>
            </div>
        </header>
        <div class="body-container float">
            <div class="content-container article-list">
                <div class="card-container card-articles">
                    <div class="card-list">
                        $for(posts)$
                        <div class="card-item img">
                            <article>
                                <div class="card-cover" style="background-image:url(/images/$banner$);"></div>
                                <a class="article-link card-link" href="$url$"></a>
                                <h2 class="article-title">$title$</h2>
                                <div class="article-meta"><strong>pe200012</strong> - <a class="article-date">$date$</a>
                                </div>
                            </article>
                        </div>
                        $endfor$
                    </div>
                </div>
                <!-- <script src="/scripts/waterfall.js"></script>
                <script>
                    waterfall(".fall-box", {
                        direction: "h",
                        spacing: 20,
                        itemClass: "card-item",
                    })
                </script> -->
            </div>
        </div>
        <nav class="page-container">

        </nav>
        <div class="footer">
            <div class="footer-container">
                <footer>
                    Site proudly generated by
                    <a href="http://jaspervdj.be/hakyll">Hakyll</a>
                </footer>
            </div>
        </div>

        <!-- MDUI JavaScript -->
        <script src="https://cdn.jsdelivr.net/npm/mdui@1.0.1/dist/js/mdui.min.js"
            integrity="sha384-gCMZcshYKOGRX9r6wbDrvF+TcCCswSHFucUzUPwka+Gr+uHgjlYvkABr95TCOz3A"
            crossorigin="anonymous"></script>
</body>

</html>
