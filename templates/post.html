<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Hakyll Blog - $title$</title>
    <link rel="stylesheet" href="/css/post.css" />
    <link rel="icon" href="/images/favicon.ico">
</head>

<body>
    <div class="root-container">
        <header class="header-container">
            <div class="header-content">
                $if(banner)$
                    <div class="post-image" style="background-image:url(/images/$banner$);"></div>
                $else$
                    <div class="post-image" style="background-image:url(/images/default-banner.png);"></div>
                $endif$
                <div class="post-text">
                    $if(title)$
                    <h1 class="title-wrap">$title$</h1>
                    $endif$
                    $if(subtitle)$
                    <h2 class="title-sub-wrap">$subtitle$</h2>
                    $endif$
                    <h2 class="title-sub-wrap"><strong>pe200012</strong> - 
                        $if(date)$
                        $date$
                        $endif$
                    </h2>
                </div>
            </div>
        </header>
        $partial("templates/sidebar.html")$
        <div class="body-container">
            <article class="content-container article-container">
                <div class="article-content">
                    <div class="article-entry">
                        $body$
                    </div>
                </div>
            </article>
        </div>
        <div class="footer">
            <div class="footer-container">
                <footer>
                    Site proudly generated by
                    <a href="http://jaspervdj.be/hakyll">Hakyll</a>
                </footer>
            </div>
        </div>
    </div>
</body>

</html>
